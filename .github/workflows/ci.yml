name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node-version: 18.x
          - os: ubuntu-latest
            node-version: 20.x
          - os: ubuntu-latest
            node-version: 22.x
          - os: windows-latest
            node-version: 20.x

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint directives
        run: npm run lint:directives

      - name: Check release metadata
        run: npm run release:metadata

      - name: Build
        run: npm run build

      - name: Smoke test package exports
        run: npm run package:smoke

      - name: Check npm package contents
        run: npm run package:contents

      - name: Test
        run: npm run test:coverage

      - name: Check public API types
        run: npm run types:check

      - name: Build documentation
        run: npm run docs:build

      - name: Check bundle size
        run: npm run size
        if: matrix.os != 'windows-latest'

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '22.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        run: npm publish --access public --tag latest --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

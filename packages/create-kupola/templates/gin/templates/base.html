{{define "base"}}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.title}}</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 0; }
        [data-theme="dark"] { background: #1a1a1a; color: #fff; }
        .kupola-header { display: flex; align-items: center; padding: 1rem; gap: 1rem; border-bottom: 1px solid #e5e5e5; }
        .kupola-header a { text-decoration: none; color: inherit; padding: 0.5rem 1rem; }
        .kupola-header a.is-active { font-weight: bold; }
        .kupola-main { padding: 1.5rem; }
    </style>
</head>
<body>
    <header class="kupola-header">
        <strong>{{.title}}</strong>
        <nav>
            <a href="/">Home</a>
            <a href="/dashboard">Dashboard</a>
        </nav>
        <button class="kupola-btn kupola-btn--sm" style="margin-left: auto;"
                k-on:click="document.documentElement.dataset.theme = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark'">
            Theme
        </button>
    </header>
    <main class="kupola-main">
        {{template "content" .}}
    </main>
    <script type="module">
        import { walk } from '@kupola/kupola/directives';
        walk(document.body);
    </script>
</body>
</html>
{{end}}

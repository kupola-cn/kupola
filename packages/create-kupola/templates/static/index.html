<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PROJECT_NAME}}</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 0; padding: 2rem; }
        [data-theme="dark"] { background: #1a1a1a; color: #fff; }
    </style>
</head>
<body>
    <h1>Welcome to {{PROJECT_NAME}}</h1>
    <p>Built with Kupola — a zero-dependency declarative UI system.</p>

    <!-- Counter example with directives -->
    <div k-data="{ count: 0 }">
        <p>Count: <span k-text="count"></span></p>
        <button class="kupola-btn kupola-btn--primary" k-on:click="count++">+1</button>
        <button class="kupola-btn kupola-btn--ghost" k-on:click="count = 0">Reset</button>
    </div>

    <!-- Theme toggle -->
    <button class="kupola-btn kupola-btn--sm" style="position: fixed; top: 16px; right: 16px;"
            k-on:click="document.documentElement.dataset.theme = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark'">
        Toggle Theme
    </button>

    <script type="module">
        import { walk } from '@kupola/kupola/directives';
        walk(document.body);
    </script>
</body>
</html>

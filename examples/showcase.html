<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark" data-brand="zengqing" class="ds-dashboard-page">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kupola Design System - Component Showcase</title>
    <link rel="stylesheet" href="../dist/kupola.css">
    <link rel="stylesheet" href="dashboard/dashboard.css">
    <style>
        .showcase-section { margin-bottom: 48px; }
        .showcase-section__title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-default);
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border-neutral-l2);
        }
        .showcase-row { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }
        .showcase-item { display: flex; flex-direction: column; gap: 8px; }
        .showcase-item__label { font-size: 11px; color: var(--text-tertiary); }
        .showcase-card {
            padding: 24px;
            background-color: var(--bg-base-secondary);
            border: 1px solid var(--border-neutral-l1);
            border-radius: 8px;
        }
        .showcase-code {
            margin-top: 12px;
            padding: 12px;
            background-color: var(--bg-base-default);
            border: 1px solid var(--border-neutral-l1);
            border-radius: 6px;
            font-family: var(--code-editor-font-family);
            font-size: 12px;
            color: var(--text-default);
            overflow-x: auto;
        }
    </style>
</head>
<body class="ds-dashboard-page">
    <div class="ds-dashboard">
        <header class="ds-dashboard__header">
            <div class="ds-dashboard__header-left">
                <div class="ds-dashboard__logo">
                        <div class="ds-dashboard__logo-icon"></div>
                        <span>Kupola</span>
                    </div>
            </div>
            <div class="ds-dashboard__header-center">
                <span style="color: var(--text-secondary); font-size: 13px;">Component Showcase</span>
            </div>
            <div class="ds-dashboard__header-right">
                <button class="ds-btn ds-btn--ghost ds-btn--sm ds-btn--icon" data-theme-toggle data-title="Theme">
                    <img class="theme-icon" src="../dist/icons/icons/sun.svg" width="16" height="16" alt="theme" class="icon">
                </button>
                <button class="ds-btn ds-btn--ghost ds-btn--sm" data-brand-toggle data-title="Brand Color" style="display: flex; align-items: center; gap: 4px;">
                    <span class="brand-icon" style="width: 10px; height: 10px; border-radius: 50%; background-color: #535164;"></span>
                    <span class="brand-name" style="font-size: 10px;">曾青</span>
                </button>
            </div>
        </header>
        
        <div class="ds-dashboard__main">
            <aside class="ds-dashboard__sidebar">
                <nav class="ds-dashboard__sidebar-nav">
                    <a href="casepages/buttons.html" class="ds-dashboard__sidebar-item" data-title="Buttons">
                        <img src="../dist/icons/icons/button.svg" width="18" height="18" alt="button" class="icon">
                    </a>
                    <a href="casepages/inputs.html" class="ds-dashboard__sidebar-item" data-title="Inputs">
                        <img src="../dist/icons/icons/input.svg" width="18" height="18" alt="input" class="icon">
                    </a>
                    <a href="casepages/forms.html" class="ds-dashboard__sidebar-item" data-title="Forms">
                        <img src="../dist/icons/icons/file-text.svg" width="18" height="18" alt="forms" class="icon">
                    </a>
                    <a href="casepages/cards.html" class="ds-dashboard__sidebar-item" data-title="Cards">
                        <img src="../dist/icons/icons/layers.svg" width="18" height="18" alt="cards" class="icon">
                    </a>
                    <a href="casepages/progress.html" class="ds-dashboard__sidebar-item" data-title="Progress">
                        <img src="../dist/icons/icons/trending-up.svg" width="18" height="18" alt="progress" class="icon">
                    </a>
                    <a href="casepages/navigation.html" class="ds-dashboard__sidebar-item" data-title="Navigation">
                        <img src="../dist/icons/icons/layout-grid.svg" width="18" height="18" alt="navigation" class="icon">
                    </a>
                    <a href="casepages/feedback.html" class="ds-dashboard__sidebar-item" data-title="Feedback">
                        <img src="../dist/icons/icons/alert-circle.svg" width="18" height="18" alt="feedback" class="icon">
                    </a>
                    <a href="casepages/data.html" class="ds-dashboard__sidebar-item" data-title="Data">
                        <img src="../dist/icons/icons/table.svg" width="18" height="18" alt="data" class="icon">
                    </a>
                    <a href="casepages/overlay.html" class="ds-dashboard__sidebar-item" data-title="Overlay">
                        <img src="../dist/icons/icons/lock.svg" width="18" height="18" alt="overlay" class="icon">
                    </a>
                    <a href="casepages/other.html" class="ds-dashboard__sidebar-item" data-title="Other">
                        <img src="../dist/icons/icons/more-h.svg" width="18" height="18" alt="other" class="icon">
                    </a>
                </nav>
            </aside>
            
            <main class="ds-dashboard__content">
                <div style="text-align: center; padding: 60px 20px;">
                    <h1 style="font-size: 32px; font-weight: 600; color: var(--text-default); margin-bottom: 16px;">Kupola Design System</h1>
                    <p style="font-size: 16px; color: var(--text-secondary); margin-bottom: 8px;">Lightweight UI toolkit for any web project</p>
                    <div style="display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background-color: var(--bg-base-secondary); border: 1px solid var(--border-neutral-l1); border-radius: 6px; margin-bottom: 32px;">
                        <span style="font-family: monospace; font-size: 13px; color: var(--text-default);">npm i @kupola/kupola</span>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 24px; max-width: 800px; margin: 0 auto;">
                        <a href="casepages/buttons.html" style="text-decoration: none; color: inherit;">
                            <div style="display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 24px; background-color: var(--bg-base-secondary); border: 1px solid var(--border-neutral-l1); border-radius: 8px; transition: all 0.15s ease;">
                                <img src="../dist/icons/icons/button.svg" width="32" height="32" alt="buttons" class="icon" style="color: var(--icon-secondary);">
                                <span style="font-size: 13px; color: var(--text-default);">Buttons</span>
                            </div>
                        </a>
                        <a href="casepages/inputs.html" style="text-decoration: none; color: inherit;">
                            <div style="display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 24px; background-color: var(--bg-base-secondary); border: 1px solid var(--border-neutral-l1); border-radius: 8px; transition: all 0.15s ease;">
                                <img src="../dist/icons/icons/input.svg" width="32" height="32" alt="inputs" class="icon" style="color: var(--icon-secondary);">
                                <span style="font-size: 13px; color: var(--text-default);">Inputs</span>
                            </div>
                        </a>
                        <a href="casepages/forms.html" style="text-decoration: none; color: inherit;">
                            <div style="display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 24px; background-color: var(--bg-base-secondary); border: 1px solid var(--border-neutral-l1); border-radius: 8px; transition: all 0.15s ease;">
                                <img src="../dist/icons/icons/file-text.svg" width="32" height="32" alt="forms" class="icon" style="color: var(--icon-secondary);">
                                <span style="font-size: 13px; color: var(--text-default);">Forms</span>
                            </div>
                        </a>
                        <a href="casepages/cards.html" style="text-decoration: none; color: inherit;">
                            <div style="display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 24px; background-color: var(--bg-base-secondary); border: 1px solid var(--border-neutral-l1); border-radius: 8px; transition: all 0.15s ease;">
                                <img src="../dist/icons/icons/layers.svg" width="32" height="32" alt="cards" class="icon" style="color: var(--icon-secondary);">
                                <span style="font-size: 13px; color: var(--text-default);">Cards</span>
                            </div>
                        </a>
                        <a href="casepages/progress.html" style="text-decoration: none; color: inherit;">
                            <div style="display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 24px; background-color: var(--bg-base-secondary); border: 1px solid var(--border-neutral-l1); border-radius: 8px; transition: all 0.15s ease;">
                                <img src="../dist/icons/icons/trending-up.svg" width="32" height="32" alt="progress" class="icon" style="color: var(--icon-secondary);">
                                <span style="font-size: 13px; color: var(--text-default);">Progress</span>
                            </div>
                        </a>
                        <a href="casepages/navigation.html" style="text-decoration: none; color: inherit;">
                            <div style="display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 24px; background-color: var(--bg-base-secondary); border: 1px solid var(--border-neutral-l1); border-radius: 8px; transition: all 0.15s ease;">
                                <img src="../dist/icons/icons/layout-grid.svg" width="32" height="32" alt="navigation" class="icon" style="color: var(--icon-secondary);">
                                <span style="font-size: 13px; color: var(--text-default);">Navigation</span>
                            </div>
                        </a>
                        <a href="casepages/feedback.html" style="text-decoration: none; color: inherit;">
                            <div style="display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 24px; background-color: var(--bg-base-secondary); border: 1px solid var(--border-neutral-l1); border-radius: 8px; transition: all 0.15s ease;">
                                <img src="../dist/icons/icons/alert-circle.svg" width="32" height="32" alt="feedback" class="icon" style="color: var(--icon-secondary);">
                                <span style="font-size: 13px; color: var(--text-default);">Feedback</span>
                            </div>
                        </a>
                        <a href="casepages/data.html" style="text-decoration: none; color: inherit;">
                            <div style="display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 24px; background-color: var(--bg-base-secondary); border: 1px solid var(--border-neutral-l1); border-radius: 8px; transition: all 0.15s ease;">
                                <img src="../dist/icons/icons/table.svg" width="32" height="32" alt="data" class="icon" style="color: var(--icon-secondary);">
                                <span style="font-size: 13px; color: var(--text-default);">Data</span>
                            </div>
                        </a>
                        <a href="casepages/overlay.html" style="text-decoration: none; color: inherit;">
                            <div style="display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 24px; background-color: var(--bg-base-secondary); border: 1px solid var(--border-neutral-l1); border-radius: 8px; transition: all 0.15s ease;">
                                <img src="../dist/icons/icons/lock.svg" width="32" height="32" alt="overlay" class="icon" style="color: var(--icon-secondary);">
                                <span style="font-size: 13px; color: var(--text-default);">Overlay</span>
                            </div>
                        </a>
                        <a href="casepages/other.html" style="text-decoration: none; color: inherit;">
                            <div style="display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 24px; background-color: var(--bg-base-secondary); border: 1px solid var(--border-neutral-l1); border-radius: 8px; transition: all 0.15s ease;">
                                <img src="../dist/icons/icons/more-h.svg" width="32" height="32" alt="other" class="icon" style="color: var(--icon-secondary);">
                                <span style="font-size: 13px; color: var(--text-default);">Other</span>
                            </div>
                        </a>
                    </div>
                </div>

            </main>
        </div>

        <footer class="ds-dashboard__footer">
            <div class="ds-dashboard__footer-left">
                <div class="ds-dashboard__status-item">
                    <span class="ds-dashboard__status-dot"></span>
                    <span>Kupola v1.4.3</span>
                </div>
            </div>
            <div class="ds-dashboard__footer-right">
                <div class="ds-dashboard__status-item">
                        <span>50+ components</span>
                    </div>
            </div>
        </footer>
    </div>
    
    <script src="../dist/kupola.umd.js"></script>
</body>
</html>

<div class="page-header"><h2 class="page-header__title">用户管理</h2></div>

<div class="ds-card" style="padding:var(--spacer-16);margin-bottom:var(--spacer-16)">
    <div style="display:flex;gap:var(--spacer-12);align-items:center;flex-wrap:wrap">
        <div class="ds-input" style="width:200px">
            <input type="text" id="searchKeyword" placeholder="搜索用户名/姓名">
        </div>
        <button class="ds-btn ds-btn--primary ds-btn--md" onclick="loadUsers()">搜索</button>
        <button class="ds-btn ds-btn--secondary ds-btn--md" onclick="showCreateModal()">新增用户</button>
    </div>
</div>

<div class="ds-card" style="padding:0;overflow-x:auto">
    <table style="width:100%;border-collapse:collapse" id="userTable">
        <thead>
            <tr style="border-bottom:1px solid var(--border-neutral-l1)">
                <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">ID</th>
                <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">用户名</th>
                <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">姓名</th>
                <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">手机</th>
                <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">角色</th>
                <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">状态</th>
                <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">操作</th>
            </tr>
        </thead>
        <tbody id="userTableBody"></tbody>
    </table>
</div>

<!-- 新增/编辑用户弹窗 -->
<div id="userModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center">
    <div class="ds-card" style="width:480px;padding:var(--spacer-24)">
        <h3 style="margin-bottom:var(--spacer-16)" id="modalTitle">新增用户</h3>
        <form id="userForm">
            <input type="hidden" id="editUserId">
            <div style="margin-bottom:var(--spacer-12)">
                <label style="display:block;font-size:var(--body-sm-font-size);color:var(--text-secondary);margin-bottom:var(--spacer-4)">用户名</label>
                <div class="ds-input" style="width:100%"><input type="text" id="formUsername" required></div>
            </div>
            <div style="margin-bottom:var(--spacer-12)" id="passwordGroup">
                <label style="display:block;font-size:var(--body-sm-font-size);color:var(--text-secondary);margin-bottom:var(--spacer-4)">密码</label>
                <div class="ds-input" style="width:100%"><input type="password" id="formPassword" required></div>
            </div>
            <div style="margin-bottom:var(--spacer-12)">
                <label style="display:block;font-size:var(--body-sm-font-size);color:var(--text-secondary);margin-bottom:var(--spacer-4)">姓名</label>
                <div class="ds-input" style="width:100%"><input type="text" id="formRealName"></div>
            </div>
            <div style="margin-bottom:var(--spacer-12)">
                <label style="display:block;font-size:var(--body-sm-font-size);color:var(--text-secondary);margin-bottom:var(--spacer-4)">手机</label>
                <div class="ds-input" style="width:100%"><input type="text" id="formPhone"></div>
            </div>
            <div style="margin-bottom:var(--spacer-16)">
                <label style="display:block;font-size:var(--body-sm-font-size);color:var(--text-secondary);margin-bottom:var(--spacer-4)">组织类型</label>
                <select id="formOrgType" class="ds-input" style="width:100%;height:28px">
                    <option value="group">集团</option>
                    <option value="branch">分机构</option>
                </select>
            </div>
            <div style="display:flex;gap:var(--spacer-8);justify-content:flex-end">
                <button type="button" class="ds-btn ds-btn--secondary ds-btn--md" onclick="closeModal()">取消</button>
                <button type="submit" class="ds-btn ds-btn--primary ds-btn--md">保存</button>
            </div>
        </form>
    </div>
</div>

<!-- 角色分配弹窗 -->
<div id="roleAssignModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center">
    <div class="ds-card" style="width:400px;padding:var(--spacer-24)">
        <h3 style="margin-bottom:var(--spacer-16)">分配角色 — <span id="roleAssignUserName"></span></h3>
        <div id="roleCheckList" style="max-height:300px;overflow-y:auto;margin-bottom:var(--spacer-16);border:1px solid var(--border-neutral-l1);border-radius:var(--radius-4);padding:var(--spacer-8)">
            <!-- 动态渲染角色列表 -->
        </div>
        <div style="display:flex;gap:var(--spacer-8);justify-content:flex-end">
            <button type="button" class="ds-btn ds-btn--secondary ds-btn--md" onclick="closeRoleAssignModal()">取消</button>
            <button type="button" class="ds-btn ds-btn--primary ds-btn--md" onclick="saveUserRoles()">保存</button>
        </div>
    </div>
</div>

<style>
    .role-check-item {
        display: flex; align-items: center; gap: var(--spacer-8);
        padding: var(--spacer-8); border-radius: var(--radius-4);
        cursor: pointer; transition: background 0.1s;
    }
    .role-check-item:hover { background: var(--bg-overlay-l1); }
    .role-check-item input[type="checkbox"] { margin: 0; cursor: pointer; }
    .role-check-item__info { flex: 1; }
    .role-check-item__name { font-size: var(--body-sm-font-size); color: var(--text-default); font-weight: 500; }
    .role-check-item__desc { font-size: var(--body-xs-font-size); color: var(--text-tertiary); }
    .role-tag {
        display: inline-block; padding: 2px 6px; border-radius: 3px;
        font-size: var(--body-xs-font-size); background: var(--bg-overlay-l2);
        color: var(--text-secondary); margin-right: 4px;
    }
</style>

<script>
(function() {
    const api = window.HIS_API;
    let allRoles = [];
    let currentRoleUserId = null;

    window.loadUsers = async function() {
        const keyword = document.getElementById('searchKeyword').value;
        const data = await api.get('/api/users?keyword=' + encodeURIComponent(keyword));
        if (!data || data.code !== 0) return;

        document.getElementById('userTableBody').innerHTML = data.data.list.map(u => {
            const rolesHtml = (u.roles || []).map(r => `<span class="role-tag">${r.name}</span>`).join('') || '<span style="color:var(--text-tertiary)">未分配</span>';
            return `
            <tr style="border-bottom:1px solid var(--border-neutral-l1)">
                <td style="padding:var(--spacer-12)">${u.id}</td>
                <td style="padding:var(--spacer-12);font-weight:500">${u.username}</td>
                <td style="padding:var(--spacer-12)">${u.real_name || '-'}</td>
                <td style="padding:var(--spacer-12)">${u.phone || '-'}</td>
                <td style="padding:var(--spacer-12)">${rolesHtml}</td>
                <td style="padding:var(--spacer-12)">
                    <span style="color:${u.status === 1 ? 'var(--status-success-default)' : 'var(--status-error-default)'}">
                        ${u.status === 1 ? '启用' : '禁用'}
                    </span>
                </td>
                <td style="padding:var(--spacer-12)">
                    <div style="display:flex;gap:4px;flex-wrap:wrap">
                        <button class="ds-btn ds-btn--sm ds-btn--tertiary" onclick="showRoleAssignModal(${u.id}, '${u.real_name || u.username}')">角色</button>
                        <button class="ds-btn ds-btn--sm ds-btn--tertiary" onclick="editUser(${u.id})">编辑</button>
                        <button class="ds-btn ds-btn--sm ds-btn--tertiary" onclick="toggleStatus(${u.id}, ${u.status === 1 ? 0 : 1})">
                            ${u.status === 1 ? '禁用' : '启用'}
                        </button>
                        <button class="ds-btn ds-btn--sm ds-btn--tertiary" style="color:var(--status-error-default)" onclick="deleteUser(${u.id})">删除</button>
                    </div>
                </td>
            </tr>`;
        }).join('');
    };

    // ── 用户 CRUD ─────────────────────────────────────────
    window.showCreateModal = function() {
        document.getElementById('modalTitle').textContent = '新增用户';
        document.getElementById('editUserId').value = '';
        document.getElementById('userForm').reset();
        document.getElementById('passwordGroup').style.display = '';
        document.getElementById('userModal').style.display = 'flex';
    };
    window.closeModal = function() { document.getElementById('userModal').style.display = 'none'; };

    window.editUser = async function(id) {
        const data = await api.get('/api/users/' + id);
        if (!data || data.code !== 0) return;
        const u = data.data;
        document.getElementById('modalTitle').textContent = '编辑用户';
        document.getElementById('editUserId').value = u.id;
        document.getElementById('formUsername').value = u.username;
        document.getElementById('formRealName').value = u.real_name || '';
        document.getElementById('formPhone').value = u.phone || '';
        document.getElementById('formOrgType').value = u.org_type;
        document.getElementById('passwordGroup').style.display = 'none';
        document.getElementById('userModal').style.display = 'flex';
    };

    window.deleteUser = async function(id) {
        if (!confirm('确定删除该用户？')) return;
        await api.del('/api/users/' + id);
        loadUsers();
    };

    window.toggleStatus = async function(id, status) {
        await api.put('/api/users/' + id + '/status', { status });
        loadUsers();
    };

    document.getElementById('userForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const id = document.getElementById('editUserId').value;
        const body = {
            username: document.getElementById('formUsername').value,
            real_name: document.getElementById('formRealName').value,
            phone: document.getElementById('formPhone').value,
            org_type: document.getElementById('formOrgType').value,
        };

        if (id) {
            await api.put('/api/users/' + id, body);
        } else {
            body.password = document.getElementById('formPassword').value;
            await api.post('/api/users', body);
        }
        closeModal();
        loadUsers();
    });

    // ── 角色分配 ──────────────────────────────────────────
    async function loadAllRoles() {
        const data = await api.get('/api/roles');
        if (data && data.code === 0) {
            allRoles = data.data;
        }
    }

    window.showRoleAssignModal = async function(userId, userName) {
        currentRoleUserId = userId;
        document.getElementById('roleAssignUserName').textContent = userName;

        if (allRoles.length === 0) await loadAllRoles();

        // 获取该用户已有角色
        const userData = await api.get('/api/users/' + userId);
        const userRoleIds = (userData && userData.code === 0 && userData.data.roles)
            ? userData.data.roles.map(r => r.id) : [];

        const container = document.getElementById('roleCheckList');
        container.innerHTML = allRoles.map(r => `
            <label class="role-check-item">
                <input type="checkbox" value="${r.id}" ${userRoleIds.includes(r.id) ? 'checked' : ''}>
                <div class="role-check-item__info">
                    <div class="role-check-item__name">${r.name}</div>
                    <div class="role-check-item__desc">${r.description || r.code}</div>
                </div>
                ${r.is_system ? '<span style="font-size:10px;color:var(--text-tertiary)">预设</span>' : ''}
            </label>
        `).join('');

        document.getElementById('roleAssignModal').style.display = 'flex';
    };

    window.closeRoleAssignModal = function() {
        document.getElementById('roleAssignModal').style.display = 'none';
        currentRoleUserId = null;
    };

    window.saveUserRoles = async function() {
        const checked = [];
        document.querySelectorAll('#roleCheckList input[type="checkbox"]:checked').forEach(cb => {
            checked.push(parseInt(cb.value));
        });

        await api.put('/api/users/' + currentRoleUserId + '/roles', { role_ids: checked });
        closeRoleAssignModal();
        loadUsers();
    };

    loadUsers();
})();
</script>

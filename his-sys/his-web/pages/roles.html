<div class="page-header"><h2 class="page-header__title">角色管理</h2></div>

<div class="ds-card" style="padding:var(--spacer-16);margin-bottom:var(--spacer-16)">
    <button class="ds-btn ds-btn--primary ds-btn--md" onclick="showRoleModal()">新增角色</button>
</div>

<div class="ds-card" style="padding:0;overflow-x:auto">
    <table style="width:100%;border-collapse:collapse">
        <thead>
            <tr style="border-bottom:1px solid var(--border-neutral-l1)">
                <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">ID</th>
                <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">角色名称</th>
                <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">编码</th>
                <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">描述</th>
                <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">系统预设</th>
                <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">操作</th>
            </tr>
        </thead>
        <tbody id="roleTableBody"></tbody>
    </table>
</div>

<!-- 角色信息弹窗 -->
<div id="roleModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center">
    <div class="ds-card" style="width:400px;padding:var(--spacer-24)">
        <h3 style="margin-bottom:var(--spacer-16)" id="roleModalTitle">新增角色</h3>
        <form id="roleForm">
            <input type="hidden" id="editRoleId">
            <div style="margin-bottom:var(--spacer-12)">
                <label style="display:block;font-size:var(--body-sm-font-size);color:var(--text-secondary);margin-bottom:var(--spacer-4)">角色名称</label>
                <div class="ds-input" style="width:100%"><input type="text" id="roleName" required></div>
            </div>
            <div style="margin-bottom:var(--spacer-12)">
                <label style="display:block;font-size:var(--body-sm-font-size);color:var(--text-secondary);margin-bottom:var(--spacer-4)">编码</label>
                <div class="ds-input" style="width:100%"><input type="text" id="roleCode" required></div>
            </div>
            <div style="margin-bottom:var(--spacer-16)">
                <label style="display:block;font-size:var(--body-sm-font-size);color:var(--text-secondary);margin-bottom:var(--spacer-4)">描述</label>
                <div class="ds-input" style="width:100%"><input type="text" id="roleDesc"></div>
            </div>
            <div style="display:flex;gap:var(--spacer-8);justify-content:flex-end">
                <button type="button" class="ds-btn ds-btn--secondary ds-btn--md" onclick="closeRoleModal()">取消</button>
                <button type="submit" class="ds-btn ds-btn--primary ds-btn--md">保存</button>
            </div>
        </form>
    </div>
</div>

<!-- 权限分配弹窗 -->
<div id="permModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center">
    <div class="ds-card" style="width:520px;padding:var(--spacer-24);max-height:80vh;display:flex;flex-direction:column">
        <h3 style="margin-bottom:var(--spacer-16)">分配权限 — <span id="permRoleName"></span></h3>
        <div id="permTree" style="flex:1;overflow-y:auto;margin-bottom:var(--spacer-16);border:1px solid var(--border-neutral-l1);border-radius:var(--radius-4);padding:var(--spacer-12)">
            <!-- 动态渲染权限树 -->
        </div>
        <div style="display:flex;gap:var(--spacer-8);justify-content:space-between;align-items:center">
            <div style="display:flex;gap:var(--spacer-8)">
                <button type="button" class="ds-btn ds-btn--ghost ds-btn--sm" onclick="toggleAllPerms(true)">全选</button>
                <button type="button" class="ds-btn ds-btn--ghost ds-btn--sm" onclick="toggleAllPerms(false)">取消全选</button>
            </div>
            <div style="display:flex;gap:var(--spacer-8)">
                <button type="button" class="ds-btn ds-btn--secondary ds-btn--md" onclick="closePermModal()">取消</button>
                <button type="button" class="ds-btn ds-btn--primary ds-btn--md" onclick="savePermissions()">保存</button>
            </div>
        </div>
    </div>
</div>

<style>
    .perm-group { margin-bottom: var(--spacer-12); }
    .perm-group__header {
        display: flex; align-items: center; gap: var(--spacer-8);
        padding: var(--spacer-6) 0; font-weight: 600; font-size: var(--body-sm-font-size);
        color: var(--text-default); border-bottom: 1px solid var(--border-neutral-l1);
        margin-bottom: var(--spacer-8);
    }
    .perm-item {
        display: flex; align-items: center; gap: var(--spacer-6);
        padding: var(--spacer-4) var(--spacer-8); border-radius: var(--radius-4);
        font-size: var(--body-sm-font-size); color: var(--text-secondary);
        cursor: pointer; transition: background 0.1s;
    }
    .perm-item:hover { background: var(--bg-overlay-l1); }
    .perm-item input[type="checkbox"] { margin: 0; cursor: pointer; }
    .perm-children { padding-left: var(--spacer-20); }
    .perm-type-badge {
        font-size: 10px; padding: 1px 4px; border-radius: 3px;
        background: var(--bg-overlay-l2); color: var(--text-tertiary);
    }
</style>

<script>
(function() {
    const api = window.HIS_API;
    let allPermissions = [];
    let currentPermRoleId = null;

    // ── 加载角色列表 ──────────────────────────────────────
    window.loadRoles = async function() {
        const data = await api.get('/api/roles');
        if (!data || data.code !== 0) return;
        document.getElementById('roleTableBody').innerHTML = data.data.map(r => `
            <tr style="border-bottom:1px solid var(--border-neutral-l1)">
                <td style="padding:var(--spacer-12)">${r.id}</td>
                <td style="padding:var(--spacer-12);font-weight:500">${r.name}</td>
                <td style="padding:var(--spacer-12)"><code style="font-size:var(--body-xs-font-size);padding:2px 6px;background:var(--bg-overlay-l2);border-radius:3px">${r.code}</code></td>
                <td style="padding:var(--spacer-12);color:var(--text-secondary)">${r.description || '-'}</td>
                <td style="padding:var(--spacer-12)">${r.is_system ? '<span style="color:var(--status-info-default)">预设</span>' : '<span style="color:var(--text-tertiary)">自定义</span>'}</td>
                <td style="padding:var(--spacer-12)">
                    <div style="display:flex;gap:4px">
                        <button class="ds-btn ds-btn--sm ds-btn--tertiary" onclick="showPermModal(${r.id}, '${r.name}')">权限</button>
                        ${!r.is_system ? `<button class="ds-btn ds-btn--sm ds-btn--tertiary" onclick="editRole(${r.id})">编辑</button>
                        <button class="ds-btn ds-btn--sm ds-btn--tertiary" style="color:var(--status-error-default)" onclick="deleteRole(${r.id})">删除</button>` : ''}
                    </div>
                </td>
            </tr>`).join('');
    };

    // ── 角色 CRUD ─────────────────────────────────────────
    window.showRoleModal = function(editId) {
        document.getElementById('roleForm').reset();
        document.getElementById('editRoleId').value = '';
        document.getElementById('roleModalTitle').textContent = '新增角色';
        document.getElementById('roleModal').style.display = 'flex';
    };
    window.closeRoleModal = function() { document.getElementById('roleModal').style.display = 'none'; };

    window.editRole = async function(id) {
        const data = await api.get('/api/roles');
        if (!data || data.code !== 0) return;
        const r = data.data.find(x => x.id === id);
        if (!r) return;
        document.getElementById('roleModalTitle').textContent = '编辑角色';
        document.getElementById('editRoleId').value = r.id;
        document.getElementById('roleName').value = r.name;
        document.getElementById('roleCode').value = r.code;
        document.getElementById('roleDesc').value = r.description || '';
        document.getElementById('roleModal').style.display = 'flex';
    };

    window.deleteRole = async function(id) {
        if (!confirm('确定删除该角色？')) return;
        await api.del('/api/roles/' + id);
        loadRoles();
    };

    document.getElementById('roleForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const body = {
            name: document.getElementById('roleName').value,
            code: document.getElementById('roleCode').value,
            description: document.getElementById('roleDesc').value
        };
        const id = document.getElementById('editRoleId').value;
        if (id) {
            await api.put('/api/roles/' + id, body);
        } else {
            await api.post('/api/roles', body);
        }
        closeRoleModal();
        loadRoles();
    });

    // ── 权限分配 ──────────────────────────────────────────
    async function loadAllPermissions() {
        const data = await api.get('/api/permissions');
        if (data && data.code === 0) {
            allPermissions = data.data;
        }
    }

    window.showPermModal = async function(roleId, roleName) {
        currentPermRoleId = roleId;
        document.getElementById('permRoleName').textContent = roleName;

        if (allPermissions.length === 0) await loadAllPermissions();

        // 获取该角色已有权限
        const permData = await api.get('/api/roles/' + roleId + '/permissions');
        const checkedIds = (permData && permData.code === 0) ? (permData.data || []) : [];

        renderPermTree(allPermissions, checkedIds);
        document.getElementById('permModal').style.display = 'flex';
    };

    window.closePermModal = function() {
        document.getElementById('permModal').style.display = 'none';
        currentPermRoleId = null;
    };

    function renderPermTree(groups, checkedIds) {
        const container = document.getElementById('permTree');
        let html = '';

        groups.forEach(group => {
            html += '<div class="perm-group">';
            html += '<div class="perm-group__header">';
            html += `<label class="perm-item" style="font-weight:600;margin:0;padding:0">
                <input type="checkbox" data-perm-id="${group.id}" data-perm-type="group" onchange="onGroupCheck(this)">
                ${group.name}
            </label>`;
            html += '</div>';

            if (group.children && group.children.length) {
                html += '<div class="perm-children">';
                group.children.forEach(child => {
                    const isChecked = checkedIds.includes(child.id);
                    const typeLabel = child.type === 'button' ? '按钮' : (child.type === 'data' ? '数据' : '菜单');
                    html += `<label class="perm-item">
                        <input type="checkbox" data-perm-id="${child.id}" data-perm-type="child" data-parent-id="${group.id}" ${isChecked ? 'checked' : ''} onchange="onChildCheck(this)">
                        ${child.name}
                        <span class="perm-type-badge">${typeLabel}</span>
                    </label>`;

                    // 三级子权限
                    if (child.children && child.children.length) {
                        html += '<div class="perm-children">';
                        child.children.forEach(sub => {
                            const subChecked = checkedIds.includes(sub.id);
                            html += `<label class="perm-item">
                                <input type="checkbox" data-perm-id="${sub.id}" data-perm-type="sub" data-parent-id="${child.id}" ${subChecked ? 'checked' : ''} onchange="onSubCheck(this)">
                                ${sub.name}
                                <span class="perm-type-badge">按钮</span>
                            </label>`;
                        });
                        html += '</div>';
                    }
                });
                html += '</div>';
            }
            html += '</div>';
        });

        container.innerHTML = html;
        // 初始化：更新组勾选状态
        container.querySelectorAll('[data-perm-type="group"]').forEach(cb => updateGroupState(cb));
    }

    window.onGroupCheck = function(el) {
        const checked = el.checked;
        const groupId = el.dataset.permId;
        // 勾选/取消所有子项
        document.querySelectorAll(`[data-parent-id="${groupId}"]`).forEach(cb => {
            cb.checked = checked;
            // 如果有子子项
            if (cb.dataset.permType === 'child') {
                const childId = cb.dataset.permId;
                document.querySelectorAll(`[data-parent-id="${childId}"]`).forEach(sub => sub.checked = checked);
            }
        });
    };

    window.onChildCheck = function(el) {
        const checked = el.checked;
        const childId = el.dataset.permId;
        // 勾选/取消子子项
        document.querySelectorAll(`[data-parent-id="${childId}"]`).forEach(sub => sub.checked = checked);
        // 更新组状态
        const groupCb = document.querySelector(`[data-perm-id="${el.dataset.parentId}"][data-perm-type="group"]`);
        if (groupCb) updateGroupState(groupCb);
    };

    window.onSubCheck = function(el) {
        // 更新父级 child 状态
        const parentCb = document.querySelector(`[data-perm-id="${el.dataset.parentId}"]`);
        if (parentCb) {
            const siblings = document.querySelectorAll(`[data-parent-id="${el.dataset.parentId}"]`);
            const allChecked = Array.from(siblings).every(s => s.checked);
            const someChecked = Array.from(siblings).some(s => s.checked);
            parentCb.checked = someChecked;
            parentCb.indeterminate = someChecked && !allChecked;
        }
        // 更新组状态
        const groupCb = document.querySelector(`[data-perm-type="group"]`);
        if (groupCb) updateGroupState(groupCb);
    };

    function updateGroupState(groupCb) {
        const groupId = groupCb.dataset.permId;
        const children = document.querySelectorAll(`[data-parent-id="${groupId}"][data-perm-type="child"]`);
        if (children.length === 0) return;
        const allChecked = Array.from(children).every(c => c.checked);
        const someChecked = Array.from(children).some(c => c.checked || c.indeterminate);
        groupCb.checked = allChecked;
        groupCb.indeterminate = someChecked && !allChecked;
    }

    window.toggleAllPerms = function(checked) {
        document.querySelectorAll('#permTree input[type="checkbox"]').forEach(cb => {
            cb.checked = checked;
            cb.indeterminate = false;
        });
    };

    window.savePermissions = async function() {
        const checked = [];
        document.querySelectorAll('#permTree input[type="checkbox"]:checked').forEach(cb => {
            checked.push(parseInt(cb.dataset.permId));
        });

        await api.put('/api/roles/' + currentPermRoleId + '/permissions', { permission_ids: checked });
        closePermModal();
        alert('权限分配成功');
    };

    loadRoles();
})();
</script>

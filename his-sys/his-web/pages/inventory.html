<div class="page-header"><h2 class="page-header__title">库存查询</h2></div>

<div class="ds-card" style="padding:var(--spacer-16);margin-bottom:var(--spacer-16)">
    <button class="ds-btn ds-btn--primary ds-btn--md" onclick="loadInventory()">刷新</button>
</div>

<div class="ds-card" style="padding:0;overflow-x:auto">
    <table style="width:100%;border-collapse:collapse">
        <thead><tr style="border-bottom:1px solid var(--border-neutral-l1)">
            <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">耗材名称</th>
            <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">所属机构</th>
            <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">批次号</th>
            <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">数量</th>
            <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">有效期</th>
            <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">存放位置</th>
        </tr></thead>
        <tbody id="invTableBody"></tbody>
    </table>
</div>

<script>
(function() {
    const api = window.HIS_API;
    window.loadInventory = async function() {
        const data = await api.get('/api/inventories');
        if (!data || data.code !== 0) return;
        document.getElementById('invTableBody').innerHTML = data.data.list.map(i => `
            <tr style="border-bottom:1px solid var(--border-neutral-l1)">
                <td style="padding:var(--spacer-12)">${i.material ? i.material.name : '-'}</td>
                <td style="padding:var(--spacer-12)">${i.org ? i.org.name : '-'}</td>
                <td style="padding:var(--spacer-12)">${i.batch_no || '-'}</td>
                <td style="padding:var(--spacer-12)">${i.quantity}</td>
                <td style="padding:var(--spacer-12)">${i.expiry_date ? new Date(i.expiry_date).toLocaleDateString() : '-'}</td>
                <td style="padding:var(--spacer-12)">${i.location || '-'}</td>
            </tr>`).join('');
    };
    loadInventory();
})();
</script>

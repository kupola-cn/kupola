<div class="page-header"><h2 class="page-header__title">耗材目录</h2></div>

<div class="ds-card" style="padding:var(--spacer-16);margin-bottom:var(--spacer-16)">
    <div style="display:flex;gap:var(--spacer-12);align-items:center;flex-wrap:wrap">
        <div class="ds-input" style="width:200px"><input type="text" id="matKeyword" placeholder="搜索名称/编码"></div>
        <button class="ds-btn ds-btn--primary ds-btn--md" onclick="loadMaterials()">搜索</button>
        <button class="ds-btn ds-btn--secondary ds-btn--md" onclick="showMatModal()">新增耗材</button>
    </div>
</div>

<div class="ds-card" style="padding:0;overflow-x:auto">
    <table style="width:100%;border-collapse:collapse">
        <thead>
            <tr style="border-bottom:1px solid var(--border-neutral-l1)">
                <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">编码</th>
                <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">名称</th>
                <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">规格</th>
                <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">单位</th>
                <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">分类</th>
                <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">生产厂家</th>
                <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">操作</th>
            </tr>
        </thead>
        <tbody id="matTableBody"></tbody>
    </table>
</div>

<div id="matModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center">
    <div class="ds-card" style="width:500px;padding:var(--spacer-24)">
        <h3 style="margin-bottom:var(--spacer-16)">耗材信息</h3>
        <form id="matForm">
            <input type="hidden" id="editMatId">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--spacer-12);margin-bottom:var(--spacer-12)">
                <div><label style="display:block;font-size:var(--body-sm-font-size);color:var(--text-secondary);margin-bottom:var(--spacer-4)">编码</label><div class="ds-input" style="width:100%"><input type="text" id="matCode" required></div></div>
                <div><label style="display:block;font-size:var(--body-sm-font-size);color:var(--text-secondary);margin-bottom:var(--spacer-4)">名称</label><div class="ds-input" style="width:100%"><input type="text" id="matName" required></div></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--spacer-12);margin-bottom:var(--spacer-12)">
                <div><label style="display:block;font-size:var(--body-sm-font-size);color:var(--text-secondary);margin-bottom:var(--spacer-4)">规格</label><div class="ds-input" style="width:100%"><input type="text" id="matSpec"></div></div>
                <div><label style="display:block;font-size:var(--body-sm-font-size);color:var(--text-secondary);margin-bottom:var(--spacer-4)">单位</label><div class="ds-input" style="width:100%"><input type="text" id="matUnit" required></div></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--spacer-12);margin-bottom:var(--spacer-12)">
                <div><label style="display:block;font-size:var(--body-sm-font-size);color:var(--text-secondary);margin-bottom:var(--spacer-4)">分类</label><div class="ds-input" style="width:100%"><input type="text" id="matCategory"></div></div>
                <div><label style="display:block;font-size:var(--body-sm-font-size);color:var(--text-secondary);margin-bottom:var(--spacer-4)">注册证号</label><div class="ds-input" style="width:100%"><input type="text" id="matRegNo"></div></div>
            </div>
            <div style="margin-bottom:var(--spacer-16)">
                <label style="display:block;font-size:var(--body-sm-font-size);color:var(--text-secondary);margin-bottom:var(--spacer-4)">生产厂家</label>
                <div class="ds-input" style="width:100%"><input type="text" id="matManufacturer"></div>
            </div>
            <div style="display:flex;gap:var(--spacer-8);justify-content:flex-end">
                <button type="button" class="ds-btn ds-btn--secondary ds-btn--md" onclick="closeMatModal()">取消</button>
                <button type="submit" class="ds-btn ds-btn--primary ds-btn--md">保存</button>
            </div>
        </form>
    </div>
</div>

<script>
(function() {
    const api = window.HIS_API;
    window.loadMaterials = async function() {
        const kw = document.getElementById('matKeyword').value;
        const data = await api.get('/api/materials?keyword=' + encodeURIComponent(kw));
        if (!data || data.code !== 0) return;
        document.getElementById('matTableBody').innerHTML = data.data.list.map(m => `
            <tr style="border-bottom:1px solid var(--border-neutral-l1)">
                <td style="padding:var(--spacer-12)">${m.code}</td>
                <td style="padding:var(--spacer-12)">${m.name}</td>
                <td style="padding:var(--spacer-12)">${m.spec || '-'}</td>
                <td style="padding:var(--spacer-12)">${m.unit}</td>
                <td style="padding:var(--spacer-12)">${m.category || '-'}</td>
                <td style="padding:var(--spacer-12)">${m.manufacturer || '-'}</td>
                <td style="padding:var(--spacer-12)">
                    <button class="ds-btn ds-btn--sm ds-btn--tertiary" onclick="deleteMat(${m.id})" style="color:var(--status-error-default)">删除</button>
                </td>
            </tr>`).join('');
    };
    window.showMatModal = function() { document.getElementById('matForm').reset(); document.getElementById('editMatId').value=''; document.getElementById('matModal').style.display='flex'; };
    window.closeMatModal = function() { document.getElementById('matModal').style.display='none'; };
    window.deleteMat = async function(id) { if(!confirm('确定删除？'))return; await api.del('/api/materials/'+id); loadMaterials(); };
    document.getElementById('matForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const body = { code:document.getElementById('matCode').value, name:document.getElementById('matName').value, spec:document.getElementById('matSpec').value, unit:document.getElementById('matUnit').value, category:document.getElementById('matCategory').value, manufacturer:document.getElementById('matManufacturer').value, registration_no:document.getElementById('matRegNo').value };
        const id = document.getElementById('editMatId').value;
        if (id) { await api.put('/api/materials/'+id, body); } else { await api.post('/api/materials', body); }
        closeMatModal(); loadMaterials();
    });
    loadMaterials();
})();
</script>

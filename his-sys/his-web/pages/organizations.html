<div class="page-header"><h2 class="page-header__title">组织管理</h2></div>

<div class="ds-card" style="padding:var(--spacer-16);margin-bottom:var(--spacer-16)">
    <button class="ds-btn ds-btn--primary ds-btn--md" onclick="showOrgModal()">新增组织</button>
</div>

<div class="ds-card" style="padding:0;overflow-x:auto">
    <table style="width:100%;border-collapse:collapse">
        <thead>
            <tr style="border-bottom:1px solid var(--border-neutral-l1)">
                <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">ID</th>
                <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">名称</th>
                <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">类型</th>
                <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">联系人</th>
                <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">地址</th>
                <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">操作</th>
            </tr>
        </thead>
        <tbody id="orgTableBody"></tbody>
    </table>
</div>

<div id="orgModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center">
    <div class="ds-card" style="width:480px;padding:var(--spacer-24)">
        <h3 style="margin-bottom:var(--spacer-16)" id="orgModalTitle">新增组织</h3>
        <form id="orgForm">
            <input type="hidden" id="editOrgId">
            <div style="margin-bottom:var(--spacer-12)">
                <label style="display:block;font-size:var(--body-sm-font-size);color:var(--text-secondary);margin-bottom:var(--spacer-4)">名称</label>
                <div class="ds-input" style="width:100%"><input type="text" id="orgName" required></div>
            </div>
            <div style="margin-bottom:var(--spacer-12)">
                <label style="display:block;font-size:var(--body-sm-font-size);color:var(--text-secondary);margin-bottom:var(--spacer-4)">类型</label>
                <select id="orgType" class="ds-input" style="width:100%;height:28px">
                    <option value="group">集团</option>
                    <option value="branch">分机构</option>
                </select>
            </div>
            <div style="margin-bottom:var(--spacer-12)">
                <label style="display:block;font-size:var(--body-sm-font-size);color:var(--text-secondary);margin-bottom:var(--spacer-4)">联系人</label>
                <div class="ds-input" style="width:100%"><input type="text" id="orgContact"></div>
            </div>
            <div style="margin-bottom:var(--spacer-12)">
                <label style="display:block;font-size:var(--body-sm-font-size);color:var(--text-secondary);margin-bottom:var(--spacer-4)">电话</label>
                <div class="ds-input" style="width:100%"><input type="text" id="orgPhone"></div>
            </div>
            <div style="margin-bottom:var(--spacer-16)">
                <label style="display:block;font-size:var(--body-sm-font-size);color:var(--text-secondary);margin-bottom:var(--spacer-4)">地址</label>
                <div class="ds-input" style="width:100%"><input type="text" id="orgAddress"></div>
            </div>
            <div style="display:flex;gap:var(--spacer-8);justify-content:flex-end">
                <button type="button" class="ds-btn ds-btn--secondary ds-btn--md" onclick="closeOrgModal()">取消</button>
                <button type="submit" class="ds-btn ds-btn--primary ds-btn--md">保存</button>
            </div>
        </form>
    </div>
</div>

<script>
(function() {
    const api = window.HIS_API;

    window.loadOrgs = async function() {
        const data = await api.get('/api/organizations');
        if (!data || data.code !== 0) return;
        renderOrgTree(data.data, document.getElementById('orgTableBody'), 0);
    };

    function renderOrgTree(orgs, tbody, level) {
        if (!orgs) return;
        orgs.forEach(org => {
            const tr = document.createElement('tr');
            tr.style.borderBottom = '1px solid var(--border-neutral-l1)';
            tr.innerHTML = `
                <td style="padding:var(--spacer-12)">${org.id}</td>
                <td style="padding:var(--spacer-12);padding-left:${12 + level * 20}px">${level > 0 ? '└ ' : ''}${org.name}</td>
                <td style="padding:var(--spacer-12)">${org.org_type === 'group' ? '集团' : '分机构'}</td>
                <td style="padding:var(--spacer-12)">${org.contact || '-'}</td>
                <td style="padding:var(--spacer-12)">${org.address || '-'}</td>
                <td style="padding:var(--spacer-12)">
                    <button class="ds-btn ds-btn--sm ds-btn--tertiary" onclick="editOrg(${org.id})">编辑</button>
                    <button class="ds-btn ds-btn--sm ds-btn--tertiary" style="color:var(--status-error-default)" onclick="deleteOrg(${org.id})">删除</button>
                </td>`;
            tbody.appendChild(tr);
            if (org.children && org.children.length) renderOrgTree(org.children, tbody, level + 1);
        });
    }

    window.showOrgModal = function() {
        document.getElementById('orgModalTitle').textContent = '新增组织';
        document.getElementById('editOrgId').value = '';
        document.getElementById('orgForm').reset();
        document.getElementById('orgModal').style.display = 'flex';
    };
    window.closeOrgModal = function() { document.getElementById('orgModal').style.display = 'none'; };

    window.editOrg = async function(id) {
        const data = await api.get('/api/organizations/' + id);
        if (!data || data.code !== 0) return;
        const o = data.data;
        document.getElementById('orgModalTitle').textContent = '编辑组织';
        document.getElementById('editOrgId').value = o.id;
        document.getElementById('orgName').value = o.name;
        document.getElementById('orgType').value = o.org_type;
        document.getElementById('orgContact').value = o.contact || '';
        document.getElementById('orgPhone').value = o.phone || '';
        document.getElementById('orgAddress').value = o.address || '';
        document.getElementById('orgModal').style.display = 'flex';
    };

    window.deleteOrg = async function(id) {
        if (!confirm('确定删除该组织？')) return;
        await api.del('/api/organizations/' + id);
        loadOrgs();
    };

    document.getElementById('orgForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const id = document.getElementById('editOrgId').value;
        const body = {
            name: document.getElementById('orgName').value,
            org_type: document.getElementById('orgType').value,
            contact: document.getElementById('orgContact').value,
            phone: document.getElementById('orgPhone').value,
            address: document.getElementById('orgAddress').value,
        };
        if (id) {
            await api.put('/api/organizations/' + id, body);
        } else {
            await api.post('/api/organizations', body);
        }
        closeOrgModal();
        loadOrgs();
    });

    loadOrgs();
})();
</script>

<div class="page-header"><h2 class="page-header__title">采购订单</h2></div>

<div class="ds-card" style="padding:var(--spacer-16);margin-bottom:var(--spacer-16)">
    <div style="display:flex;gap:var(--spacer-12);align-items:center">
        <button class="ds-btn ds-btn--primary ds-btn--md" onclick="showCreateOrderModal()">新建采购单</button>
        <button class="ds-btn ds-btn--secondary ds-btn--md" onclick="loadOrders()">刷新</button>
    </div>
</div>

<div class="ds-card" style="padding:0;overflow-x:auto">
    <table style="width:100%;border-collapse:collapse">
        <thead><tr style="border-bottom:1px solid var(--border-neutral-l1)">
            <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">订单号</th>
            <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">供应商</th>
            <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">总金额</th>
            <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">状态</th>
            <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">创建人</th>
            <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">创建时间</th>
            <th style="padding:var(--spacer-12);text-align:left;font-size:var(--body-sm-font-size);color:var(--text-secondary)">操作</th>
        </tr></thead>
        <tbody id="orderTableBody"></tbody>
    </table>
</div>

<!-- 新建采购单弹窗 -->
<div id="createOrderModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center">
    <div class="ds-card" style="width:640px;padding:var(--spacer-24);max-height:85vh;display:flex;flex-direction:column">
        <h3 style="margin-bottom:var(--spacer-16)">新建采购单</h3>
        <form id="orderForm" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--spacer-12);margin-bottom:var(--spacer-12)">
                <div>
                    <label style="display:block;font-size:var(--body-sm-font-size);color:var(--text-secondary);margin-bottom:var(--spacer-4)">供应商</label>
                    <select id="orderSupplier" style="width:100%;height:32px;padding:0 var(--spacer-8);background:var(--bg-base-default);border:1px solid var(--border-neutral-l1);border-radius:var(--radius-4);color:var(--text-default);font-size:var(--body-sm-font-size)" required>
                        <option value="">请选择供应商</option>
                    </select>
                </div>
                <div>
                    <label style="display:block;font-size:var(--body-sm-font-size);color:var(--text-secondary);margin-bottom:var(--spacer-4)">备注</label>
                    <div class="ds-input" style="width:100%"><input type="text" id="orderRemark" placeholder="可选"></div>
                </div>
            </div>

            <div style="margin-bottom:var(--spacer-8);display:flex;justify-content:space-between;align-items:center">
                <label style="font-size:var(--body-sm-font-size);color:var(--text-secondary);font-weight:500">采购明细</label>
                <button type="button" class="ds-btn ds-btn--ghost ds-btn--sm" onclick="addOrderItem()">+ 添加行</button>
            </div>

            <div style="flex:1;overflow-y:auto;border:1px solid var(--border-neutral-l1);border-radius:var(--radius-4);margin-bottom:var(--spacer-12)">
                <table style="width:100%;border-collapse:collapse" id="orderItemsTable">
                    <thead><tr style="border-bottom:1px solid var(--border-neutral-l1);background:var(--bg-base-secondary)">
                        <th style="padding:var(--spacer-8);text-align:left;font-size:var(--body-xs-font-size);color:var(--text-secondary);width:40%">耗材</th>
                        <th style="padding:var(--spacer-8);text-align:left;font-size:var(--body-xs-font-size);color:var(--text-secondary);width:15%">数量</th>
                        <th style="padding:var(--spacer-8);text-align:left;font-size:var(--body-xs-font-size);color:var(--text-secondary);width:20%">单价</th>
                        <th style="padding:var(--spacer-8);text-align:left;font-size:var(--body-xs-font-size);color:var(--text-secondary);width:15%">小计</th>
                        <th style="padding:var(--spacer-8);text-align:center;font-size:var(--body-xs-font-size);color:var(--text-secondary);width:10%">操作</th>
                    </tr></thead>
                    <tbody id="orderItemsBody"></tbody>
                </table>
            </div>

            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--spacer-12);padding:var(--spacer-8);background:var(--bg-base-secondary);border-radius:var(--radius-4)">
                <span style="font-size:var(--body-sm-font-size);color:var(--text-secondary)">合计金额</span>
                <span style="font-size:var(--heading-sm-font-size);font-weight:600;color:var(--text-default)" id="orderTotal">¥0.00</span>
            </div>

            <div style="display:flex;gap:var(--spacer-8);justify-content:flex-end">
                <button type="button" class="ds-btn ds-btn--secondary ds-btn--md" onclick="closeCreateOrderModal()">取消</button>
                <button type="submit" class="ds-btn ds-btn--primary ds-btn--md">提交</button>
            </div>
        </form>
    </div>
</div>

<!-- 订单详情弹窗 -->
<div id="orderDetailModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center">
    <div class="ds-card" style="width:560px;padding:var(--spacer-24);max-height:80vh;overflow-y:auto">
        <h3 style="margin-bottom:var(--spacer-16)" id="orderDetailTitle">订单详情</h3>
        <div id="orderDetailContent"></div>
        <div style="display:flex;gap:var(--spacer-8);justify-content:flex-end;margin-top:var(--spacer-16)">
            <button type="button" class="ds-btn ds-btn--secondary ds-btn--md" onclick="closeOrderDetail()">关闭</button>
        </div>
    </div>
</div>

<style>
    .order-item-row input, .order-item-row select {
        width: 100%; height: 28px; padding: 0 var(--spacer-6);
        background: var(--bg-base-default); border: 1px solid var(--border-neutral-l1);
        border-radius: var(--radius-4); color: var(--text-default);
        font-size: var(--body-sm-font-size);
    }
    .order-item-row td { padding: var(--spacer-6); }
    .order-status-badge {
        display: inline-block; padding: 2px 8px; border-radius: 10px;
        font-size: var(--body-xs-font-size); font-weight: 500;
    }
</style>

<script>
(function() {
    const api = window.HIS_API;
    const statusMap = {0:'草稿', 1:'已提交', 2:'已审批', 3:'已入库'};
    const statusColor = {0:'var(--text-tertiary)', 1:'var(--status-info-default)', 2:'var(--status-warning-default)', 3:'var(--status-success-default)'};
    let suppliers = [];
    let materials = [];
    let orderItemIndex = 0;

    // ── 加载订单列表 ──────────────────────────────────────
    window.loadOrders = async function() {
        const data = await api.get('/api/purchase-orders');
        if (!data || data.code !== 0) return;
        document.getElementById('orderTableBody').innerHTML = data.data.list.map(o => `
            <tr style="border-bottom:1px solid var(--border-neutral-l1)">
                <td style="padding:var(--spacer-12);font-weight:500">${o.order_no}</td>
                <td style="padding:var(--spacer-12)">${o.supplier ? o.supplier.name : '-'}</td>
                <td style="padding:var(--spacer-12)">¥${(o.total_amount || 0).toFixed(2)}</td>
                <td style="padding:var(--spacer-12)">
                    <span class="order-status-badge" style="color:${statusColor[o.status]};background:${statusColor[o.status]}22">
                        ${statusMap[o.status]||'未知'}
                    </span>
                </td>
                <td style="padding:var(--spacer-12)">${o.creator ? o.creator.real_name : '-'}</td>
                <td style="padding:var(--spacer-12);font-size:var(--body-xs-font-size);color:var(--text-secondary)">${new Date(o.created_at).toLocaleString()}</td>
                <td style="padding:var(--spacer-12)">
                    <div style="display:flex;gap:4px">
                        <button class="ds-btn ds-btn--sm ds-btn--tertiary" onclick="viewOrder(${o.id})">详情</button>
                        ${o.status === 0 ? `<button class="ds-btn ds-btn--sm ds-btn--tertiary" onclick="updateOrderStatus(${o.id}, 1)">提交</button>` : ''}
                        ${o.status === 1 ? `<button class="ds-btn ds-btn--sm ds-btn--tertiary" onclick="updateOrderStatus(${o.id}, 2)">审批</button>` : ''}
                    </div>
                </td>
            </tr>`).join('');
    };

    // ── 查看订单详情 ──────────────────────────────────────
    window.viewOrder = async function(id) {
        const data = await api.get('/api/purchase-orders/' + id);
        if (!data || data.code !== 0) return;
        const o = data.data;
        document.getElementById('orderDetailTitle').textContent = '订单 ' + o.order_no;
        let html = `
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--spacer-8);margin-bottom:var(--spacer-16);font-size:var(--body-sm-font-size)">
                <div><span style="color:var(--text-secondary)">供应商：</span>${o.supplier ? o.supplier.name : '-'}</div>
                <div><span style="color:var(--text-secondary)">状态：</span><span style="color:${statusColor[o.status]}">${statusMap[o.status]||'未知'}</span></div>
                <div><span style="color:var(--text-secondary)">创建人：</span>${o.creator ? o.creator.real_name : '-'}</div>
                <div><span style="color:var(--text-secondary)">总金额：</span><strong>¥${(o.total_amount||0).toFixed(2)}</strong></div>
                ${o.remark ? `<div style="grid-column:1/-1"><span style="color:var(--text-secondary)">备注：</span>${o.remark}</div>` : ''}
            </div>
            <table style="width:100%;border-collapse:collapse;font-size:var(--body-sm-font-size)">
                <thead><tr style="border-bottom:1px solid var(--border-neutral-l1)">
                    <th style="padding:var(--spacer-8);text-align:left;color:var(--text-secondary)">耗材</th>
                    <th style="padding:var(--spacer-8);text-align:right;color:var(--text-secondary)">数量</th>
                    <th style="padding:var(--spacer-8);text-align:right;color:var(--text-secondary)">单价</th>
                    <th style="padding:var(--spacer-8);text-align:right;color:var(--text-secondary)">金额</th>
                </tr></thead>
                <tbody>
                    ${(o.items || []).map(item => `
                        <tr style="border-bottom:1px solid var(--border-neutral-l1)">
                            <td style="padding:var(--spacer-8)">${item.material ? item.material.name : '-'}</td>
                            <td style="padding:var(--spacer-8);text-align:right">${item.quantity}</td>
                            <td style="padding:var(--spacer-8);text-align:right">¥${(item.unit_price||0).toFixed(2)}</td>
                            <td style="padding:var(--spacer-8);text-align:right">¥${(item.amount||0).toFixed(2)}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>`;
        document.getElementById('orderDetailContent').innerHTML = html;
        document.getElementById('orderDetailModal').style.display = 'flex';
    };
    window.closeOrderDetail = function() { document.getElementById('orderDetailModal').style.display = 'none'; };

    // ── 更新订单状态 ──────────────────────────────────────
    window.updateOrderStatus = async function(id, status) {
        const action = statusMap[status] || '';
        if (!confirm('确定' + action + '该订单？')) return;
        await api.put('/api/purchase-orders/' + id + '/status', { status });
        loadOrders();
    };

    // ── 新建采购单 ────────────────────────────────────────
    async function loadSuppliers() {
        const data = await api.get('/api/suppliers');
        if (data && data.code === 0) suppliers = data.data.list || data.data || [];
    }
    async function loadMaterials() {
        const data = await api.get('/api/materials');
        if (data && data.code === 0) materials = data.data.list || data.data || [];
    }

    window.showCreateOrderModal = async function() {
        if (suppliers.length === 0) await loadSuppliers();
        if (materials.length === 0) await loadMaterials();

        // 填充供应商下拉
        const sel = document.getElementById('orderSupplier');
        sel.innerHTML = '<option value="">请选择供应商</option>' +
            suppliers.map(s => `<option value="${s.id}">${s.name}</option>`).join('');

        document.getElementById('orderRemark').value = '';
        document.getElementById('orderItemsBody').innerHTML = '';
        document.getElementById('orderTotal').textContent = '¥0.00';
        orderItemIndex = 0;

        addOrderItem(); // 默认添加一行
        document.getElementById('createOrderModal').style.display = 'flex';
    };
    window.closeCreateOrderModal = function() { document.getElementById('createOrderModal').style.display = 'none'; };

    window.addOrderItem = function() {
        const tbody = document.getElementById('orderItemsBody');
        const idx = orderItemIndex++;
        const tr = document.createElement('tr');
        tr.className = 'order-item-row';
        tr.dataset.idx = idx;
        tr.innerHTML = `
            <td>
                <select onchange="onItemChange(${idx})">
                    <option value="">选择耗材</option>
                    ${materials.map(m => `<option value="${m.id}" data-price="${m.unit_price || 0}">${m.name}${m.spec ? ' ('+m.spec+')' : ''}</option>`).join('')}
                </select>
            </td>
            <td><input type="number" min="1" value="1" onchange="onItemChange(${idx})" oninput="onItemChange(${idx})"></td>
            <td><input type="number" min="0" step="0.01" value="0" onchange="onItemChange(${idx})" oninput="onItemChange(${idx})"></td>
            <td style="font-weight:500">¥0.00</td>
            <td style="text-align:center">
                <button type="button" class="ds-btn ds-btn--sm ds-btn--ghost" style="color:var(--status-error-default)" onclick="removeOrderItem(this)">×</button>
            </td>`;
        tbody.appendChild(tr);
    };

    window.removeOrderItem = function(btn) {
        const tr = btn.closest('tr');
        tr.remove();
        calcTotal();
    };

    window.onItemChange = function(idx) {
        const tr = document.querySelector(`tr[data-idx="${idx}"]`);
        if (!tr) return;
        const sel = tr.querySelector('select');
        const inputs = tr.querySelectorAll('input');
        const qty = parseInt(inputs[0].value) || 0;
        const price = parseFloat(inputs[1].value) || 0;
        const amount = qty * price;
        tr.querySelector('td:nth-child(4)').textContent = '¥' + amount.toFixed(2);
        calcTotal();
    };

    function calcTotal() {
        let total = 0;
        document.querySelectorAll('.order-item-row').forEach(tr => {
            const inputs = tr.querySelectorAll('input');
            const qty = parseInt(inputs[0].value) || 0;
            const price = parseFloat(inputs[1].value) || 0;
            total += qty * price;
        });
        document.getElementById('orderTotal').textContent = '¥' + total.toFixed(2);
    }

    document.getElementById('orderForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const supplierId = parseInt(document.getElementById('orderSupplier').value);
        if (!supplierId) { alert('请选择供应商'); return; }

        const items = [];
        document.querySelectorAll('.order-item-row').forEach(tr => {
            const sel = tr.querySelector('select');
            const inputs = tr.querySelectorAll('input');
            const materialId = parseInt(sel.value);
            const qty = parseInt(inputs[0].value) || 0;
            const price = parseFloat(inputs[1].value) || 0;
            if (materialId && qty > 0) {
                items.push({ material_id: materialId, quantity: qty, unit_price: price });
            }
        });

        if (items.length === 0) { alert('请至少添加一项耗材'); return; }

        const body = {
            supplier_id: supplierId,
            remark: document.getElementById('orderRemark').value,
            items: items
        };

        const result = await api.post('/api/purchase-orders', body);
        if (result && result.code === 0) {
            closeCreateOrderModal();
            loadOrders();
        } else {
            alert(result ? result.message : '创建失败');
        }
    });

    loadOrders();
})();
</script>

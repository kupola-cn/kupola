<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark" data-brand="zengqing" class="ds-dashboard-page">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kupola Design System - Cards</title>
    <link rel="stylesheet" href="../css/Kupola.css">
    <link rel="stylesheet" href="../css/components-ext.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/accessibility.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../dashboard/dashboard.css">
    <style>
        .showcase-section { margin-bottom: 48px; }
        .showcase-section__title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-default);
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border-neutral-l2);
        }
        .showcase-row { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }
        .showcase-item { display: flex; flex-direction: column; gap: 8px; }
        .showcase-item__label { font-size: 11px; color: var(--text-tertiary); }
        .showcase-card {
            padding: 24px;
            background-color: var(--bg-overlay-l1);
            border: 1px solid var(--border-neutral-l1);
            border-radius: 8px;
        }
        .component-docs {
            margin-top: 16px;
            padding: 16px;
            background-color: var(--bg-overlay-l1);
            border-radius: 6px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .component-docs h4 {
            margin: 0 0 8px 0;
            font-size: 14px;
            color: var(--text-default);
        }
        .component-docs table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 8px;
        }
        .component-docs th, .component-docs td {
            text-align: left;
            padding: 6px 8px;
            border-bottom: 1px solid var(--border-neutral-l1);
            font-size: 12px;
        }
        .component-docs th {
            color: var(--text-tertiary);
            font-weight: 500;
        }
    </style>
</head>
<body class="ds-dashboard-page">
    <div class="ds-dashboard">
        <header class="ds-dashboard__header">
            <div class="ds-dashboard__header-left">
                <div class="ds-dashboard__logo">
                    <div class="ds-dashboard__logo-icon"></div>
                    <span>Kupola Design System</span>
                </div>
            </div>
            <div class="ds-dashboard__header-center">
                <span style="color: var(--text-secondary); font-size: 13px;">Cards</span>
            </div>
            <div class="ds-dashboard__header-right">
                <button class="ds-btn ds-btn--ghost ds-btn--sm ds-btn--icon" data-theme-toggle data-title="Theme">
                    <img class="theme-icon" src="../icons/sun.svg" width="16" height="16" alt="theme" class="icon">
                </button>
                <button class="ds-btn ds-btn--ghost ds-btn--sm" data-brand-toggle data-title="Brand Color" style="display: flex; align-items: center; gap: 4px;">
                    <span class="brand-icon" style="width: 10px; height: 10px; border-radius: 50%; background-color: #535164;"></span>
                    <span class="brand-name" style="font-size: 10px;">曾青</span>
                </button>
            </div>
        </header>
        
        <div class="ds-dashboard__main">
            <aside class="ds-dashboard__sidebar">
                <nav class="ds-dashboard__sidebar-nav">
                    <a href="buttons.html" class="ds-dashboard__sidebar-item" data-title="Buttons">
                        <img src="../icons/button.svg" width="18" height="18" alt="button" class="icon">
                    </a>
                    <a href="inputs.html" class="ds-dashboard__sidebar-item" data-title="Inputs">
                        <img src="../icons/input.svg" width="18" height="18" alt="input" class="icon">
                    </a>
                    <a href="forms.html" class="ds-dashboard__sidebar-item" data-title="Forms">
                        <img src="../icons/file-text.svg" width="18" height="18" alt="forms" class="icon">
                    </a>
                    <a href="fileupload.html" class="ds-dashboard__sidebar-item" data-title="File Upload">
                        <img src="../icons/upload.svg" width="18" height="18" alt="file upload" class="icon">
                    </a>
                    <a href="images.html" class="ds-dashboard__sidebar-item" data-title="Images">
                        <img src="../icons/image.svg" width="18" height="18" alt="images" class="icon">
                    </a>
                    <a href="cards.html" class="ds-dashboard__sidebar-item is-active" data-title="Cards">
                        <img src="../icons/layers.svg" width="18" height="18" alt="cards" class="icon">
                    </a>
                    <a href="progress.html" class="ds-dashboard__sidebar-item" data-title="Progress">
                        <img src="../icons/trending-up.svg" width="18" height="18" alt="progress" class="icon">
                    </a>
                    <a href="navigation.html" class="ds-dashboard__sidebar-item" data-title="Navigation">
                        <img src="../icons/layout-grid.svg" width="18" height="18" alt="navigation" class="icon">
                    </a>
                    <a href="feedback.html" class="ds-dashboard__sidebar-item" data-title="Feedback">
                        <img src="../icons/alert-circle.svg" width="18" height="18" alt="feedback" class="icon">
                    </a>
                    <a href="data.html" class="ds-dashboard__sidebar-item" data-title="Data">
                        <img src="../icons/table.svg" width="18" height="18" alt="data" class="icon">
                    </a>
                    <a href="dataviz.html" class="ds-dashboard__sidebar-item" data-title="Data Viz">
                        <img src="../icons/bar-chart-2.svg" width="18" height="18" alt="data viz" class="icon">
                    </a>
                    <a href="overlay.html" class="ds-dashboard__sidebar-item" data-title="Overlay">
                        <img src="../icons/lock.svg" width="18" height="18" alt="overlay" class="icon">
                    </a>
                    <a href="other.html" class="ds-dashboard__sidebar-item" data-title="Other">
                        <img src="../icons/more-h.svg" width="18" height="18" alt="other" class="icon">
                    </a>
                </nav>
            </aside>
            
            <main class="ds-dashboard__content">
                <div class="showcase-section">
                    <div class="showcase-section__title">Card</div>
                    <div class="showcase-row">
                        <div class="showcase-card" style="width: 300px;">
                            <div style="font-size: 16px; font-weight: 600; margin-bottom: 8px;">Basic Card</div>
                            <div style="color: var(--text-secondary); font-size: 13px;">This is a basic card with some content.</div>
                        </div>
                        <div class="showcase-card" style="width: 300px;">
                            <div style="font-size: 16px; font-weight: 600; margin-bottom: 8px;">Card with Actions</div>
                            <div style="color: var(--text-secondary); font-size: 13px; margin-bottom: 16px;">This card has action buttons.</div>
                            <div style="display: flex; gap: 8px;">
                                <button class="ds-btn ds-btn--ghost ds-btn--sm">Cancel</button>
                                <button class="ds-btn ds-btn--primary ds-btn--sm">Confirm</button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="component-docs">
                        <h4>Props</h4>
                        <table>
                            <thead>
                                <tr><th>Property</th><th>Type</th><th>Default</th><th>Description</th></tr>
                            </thead>
                            <tbody>
                                <tr><td>title</td><td>string</td><td>''</td><td>Card title</td></tr>
                                <tr><td>description</td><td>string</td><td>''</td><td>Card description</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <script src="../js/icons.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/tooltip.js"></script>
    <script src="../js/select.js"></script>
    <script src="../js/datepicker.js"></script>
    <script src="../js/timepicker.js"></script>
    <script src="../js/numberinput.js"></script>
    <script src="../js/slider.js"></script>
    <script src="../js/dropdown.js"></script>
    <script src="../js/notification.js"></script>
    <script src="../js/message.js"></script>
    <script src="../js/calendar.js"></script>
    <script src="../js/color-picker.js"></script>
    <script src="../js/collapse.js"></script>
    <script src="../js/dynamic-tags.js"></script>
    <script src="../js/drawer.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof initDatepickers === 'function') initDatepickers();
            if (typeof initTimepickers === 'function') initTimepickers();
            if (typeof initNumberInputs === 'function') initNumberInputs();
            if (typeof initSliders === 'function') initSliders();
            if (typeof initSelects === 'function') initSelects();
            if (typeof initDropdowns === 'function') initDropdowns();
            if (typeof initTooltips === 'function') initTooltips();
            if (typeof initNotifications === 'function') initNotifications();
            if (typeof initMessages === 'function') initMessages();
            if (typeof initCalendars === 'function') initCalendars();
            if (typeof initColorPickers === 'function') initColorPickers();
            if (typeof initCollapses === 'function') initCollapses();
            if (typeof initDynamicTags === 'function') initDynamicTags();
            if (typeof initDrawers === 'function') initDrawers();
        });
    </script>
</body>
</html>

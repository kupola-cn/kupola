<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kupola Data Bind 性能测试</title>
  <link rel="stylesheet" href="css/Kupola.min.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-base-primary);
      color: var(--text-default);
      padding: 20px;
      line-height: 1.6;
    }
    .test-section {
      background: var(--bg-base-secondary);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
      border: 1px solid var(--border-neutral-l1);
    }
    .test-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      margin-top: 16px;
      max-height: 400px;
      overflow-y: auto;
      padding: 12px;
      background: var(--bg-overlay-l2);
      border-radius: 4px;
    }
    .test-item {
      background: var(--bg-base-primary);
      padding: 12px;
      border-radius: 4px;
      border: 1px solid var(--border-neutral-l2);
      font-size: 13px;
    }
    .test-item__label {
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .test-item__value {
      font-weight: 500;
      color: var(--text-default);
    }
    .stats {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .stat-card {
      background: var(--bg-overlay-l1);
      padding: 16px 24px;
      border-radius: 8px;
      min-width: 140px;
    }
    .stat-card__label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .stat-card__value {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-default);
    }
    .stat-card__value.success {
      color: var(--text-success);
    }
    .stat-card__value.warning {
      color: var(--text-warning);
    }
    .stat-card__value.error {
      color: var(--text-error);
    }
    .btn-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    .progress-bar {
      height: 8px;
      background: var(--bg-overlay-l2);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress-bar__fill {
      height: 100%;
      background: var(--bg-brand);
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    .chart-container {
      height: 200px;
      margin-top: 16px;
      background: var(--bg-overlay-l2);
      border-radius: 4px;
      position: relative;
      overflow: hidden;
    }
    .chart-bar {
      position: absolute;
      bottom: 0;
      width: 4px;
      background: var(--bg-brand);
      border-radius: 2px 2px 0 0;
      transition: height 0.1s ease;
    }
    .chart-axis {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--border-neutral-l2);
    }
    .log-area {
      background: #0C0C0D;
      color: #D1D3DB;
      padding: 12px;
      border-radius: 4px;
      font-family: 'Consolas', monospace;
      font-size: 12px;
      max-height: 200px;
      overflow-y: auto;
      margin-top: 16px;
      white-space: pre-wrap;
    }
    .log-entry {
      margin-bottom: 4px;
    }
    .log-entry.info {
      color: #60A5FA;
    }
    .log-entry.success {
      color: #34D399;
    }
    .log-entry.warning {
      color: #FBBF24;
    }
    .log-entry.error {
      color: #F87171;
    }
  </style>
</head>
<body>
  <h1>Kupola Data Bind 性能测试</h1>
  <p class="ds-text-secondary">测试 Proxy 响应式和批量更新的实际性能表现</p>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-card__label">绑定元素数</div>
      <div class="stat-card__value" id="bind-count">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__label">更新耗时</div>
      <div class="stat-card__value" id="update-time">0ms</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__label">FPS</div>
      <div class="stat-card__value" id="fps">60</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__label">内存占用</div>
      <div class="stat-card__value" id="memory">0MB</div>
    </div>
  </div>

  <div class="test-section">
    <h2>1. Proxy 响应式直接赋值测试</h2>
    <p>测试直接修改 proxy 对象属性，验证自动触发更新</p>
    <div class="btn-group">
      <button class="ds-btn ds-btn--brand" id="btn-proxy-single">单个 Proxy 赋值</button>
      <button class="ds-btn ds-btn--brand" id="btn-proxy-batch">批量 Proxy 赋值 (100个)</button>
      <button class="ds-btn ds-btn--brand" id="btn-proxy-deep">深层嵌套赋值</button>
    </div>
    <div class="test-grid" id="grid-proxy">
    </div>
    <div class="progress-bar">
      <div class="progress-bar__fill" id="proxy-progress" style="width: 0%"></div>
    </div>
  </div>

  <div class="test-section">
    <h2>2. 传统 set() 方法对比测试</h2>
    <p>对比传统 set() 方法和 Proxy 直接赋值的性能差异</p>
    <div class="btn-group">
      <button class="ds-btn ds-btn--secondary" id="btn-set-single">单个 set()</button>
      <button class="ds-btn ds-btn--secondary" id="btn-set-batch">批量 set() (100个)</button>
      <button class="ds-btn ds-btn--secondary" id="btn-set-silent">批量 set() 静默模式</button>
    </div>
    <div class="test-grid" id="grid-set">
    </div>
    <div class="progress-bar">
      <div class="progress-bar__fill" id="set-progress" style="width: 0%"></div>
    </div>
  </div>

  <div class="test-section">
    <h2>3. 大数据量列表渲染测试</h2>
    <p>测试 1000+ 数据绑定元素的性能</p>
    <div class="btn-group">
      <button class="ds-btn ds-btn--outline" id="btn-generate-100">生成 100 条数据</button>
      <button class="ds-btn ds-btn--outline" id="btn-generate-500">生成 500 条数据</button>
      <button class="ds-btn ds-btn--outline" id="btn-generate-1000">生成 1000 条数据</button>
      <button class="ds-btn ds-btn--outline" id="btn-update-all">更新所有数据</button>
      <button class="ds-btn ds-btn--outline" id="btn-clear">清空数据</button>
    </div>
    <div class="test-grid" id="grid-large" style="max-height: 500px;">
    </div>
  </div>

  <div class="test-section">
    <h2>4. 计算属性测试</h2>
    <p>测试 computed 属性的依赖追踪和自动更新</p>
    <div class="btn-group">
      <button class="ds-btn ds-btn--ghost" id="btn-update-first">修改 firstName</button>
      <button class="ds-btn ds-btn--ghost" id="btn-update-last">修改 lastName</button>
      <button class="ds-btn ds-btn--ghost" id="btn-update-both">同时修改两者</button>
    </div>
    <div style="margin-top: 16px; padding: 16px; background: var(--bg-overlay-l1); border-radius: 4px;">
      <div style="display: flex; gap: 24px;">
        <div>
          <label>FirstName:</label>
          <input type="text" class="ds-input" data-bind="user.firstName:value" style="width: 200px; margin-top: 4px;">
        </div>
        <div>
          <label>LastName:</label>
          <input type="text" class="ds-input" data-bind="user.lastName:value" style="width: 200px; margin-top: 4px;">
        </div>
        <div>
          <label>FullName (computed):</label>
          <div class="test-item__value" data-bind="user.fullName:text" style="margin-top: 4px; font-size: 16px;"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="test-section">
    <h2>5. 实时 FPS 监控</h2>
    <div class="chart-container">
      <div class="chart-axis"></div>
      <div id="fps-chart"></div>
    </div>
  </div>

  <div class="test-section">
    <h2>测试日志</h2>
    <div class="log-area" id="log-area"></div>
  </div>

  <script src="js/data-bind.js"></script>
  <script>
    const logArea = document.getElementById('log-area');
    const fpsChart = document.getElementById('fps-chart');
    const fpsValues = [];

    function log(message, type = 'info') {
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      const time = new Date().toLocaleTimeString();
      entry.textContent = `[${time}] ${message}`;
      logArea.appendChild(entry);
      logArea.scrollTop = logArea.scrollHeight;
    }

    function updateStats() {
      const bindCount = document.querySelectorAll('[data-bind]').length;
      document.getElementById('bind-count').textContent = bindCount;

      if (performance.memory) {
        const memoryMB = (performance.memory.usedJSHeapSize / 1024 / 1024).toFixed(1);
        document.getElementById('memory').textContent = `${memoryMB}MB`;
      }
    }

    function measureTime(label, callback) {
      const start = performance.now();
      callback();
      const end = performance.now();
      const duration = (end - start).toFixed(2);
      document.getElementById('update-time').textContent = `${duration}ms`;
      
      const color = duration > 50 ? 'error' : duration > 16 ? 'warning' : 'success';
      document.getElementById('update-time').className = `stat-card__value ${color}`;
      
      log(`${label}: ${duration}ms`, duration > 50 ? 'warning' : 'success');
      return duration;
    }

    function createTestGrid(container, count, prefix) {
      container.innerHTML = '';
      for (let i = 0; i < count; i++) {
        const item = document.createElement('div');
        item.className = 'test-item';
        item.innerHTML = `
          <div class="test-item__label">${prefix}${i + 1}</div>
          <div class="test-item__value" data-bind="${prefix}.item${i}:text"></div>
        `;
        container.appendChild(item);
      }
      kupolaData.bind();
      updateStats();
    }

    function updateFpsChart(fps) {
      fpsValues.push(fps);
      if (fpsValues.length > 100) fpsValues.shift();
      
      fpsChart.innerHTML = '';
      const maxFps = 60;
      const width = 4;
      const gap = 2;
      
      fpsValues.forEach((value, index) => {
        const bar = document.createElement('div');
        bar.className = 'chart-bar';
        bar.style.left = `${index * (width + gap)}px`;
        bar.style.width = `${width}px`;
        bar.style.height = `${(value / maxFps) * 100}%`;
        bar.style.backgroundColor = value >= 55 ? '#34D399' : value >= 30 ? '#FBBF24' : '#F87171';
        fpsChart.appendChild(bar);
      });
      
      document.getElementById('fps').textContent = fps;
      document.getElementById('fps').className = `stat-card__value ${fps >= 55 ? 'success' : fps >= 30 ? 'warning' : 'error'}`;
    }

    let lastTime = performance.now();
    let frameCount = 0;
    function fpsLoop() {
      const currentTime = performance.now();
      frameCount++;
      
      if (currentTime - lastTime >= 1000) {
        const fps = frameCount;
        updateFpsChart(fps);
        frameCount = 0;
        lastTime = currentTime;
      }
      
      requestAnimationFrame(fpsLoop);
    }
    fpsLoop();

    kupolaData.load({
      user: { firstName: 'John', lastName: 'Doe' },
      proxy: {},
      set: {}
    });

    kupolaData.computed('user.fullName', ['user.firstName', 'user.lastName'], (first, last) => {
      return `${first} ${last}`;
    });

    log('初始化完成，数据绑定系统已就绪', 'success');

    document.getElementById('btn-proxy-single').addEventListener('click', () => {
      measureTime('单个 Proxy 赋值', () => {
        kupolaData.data.proxy.item0 = `更新于 ${new Date().toLocaleTimeString()}`;
      });
    });

    document.getElementById('btn-proxy-batch').addEventListener('click', () => {
      measureTime('批量 Proxy 赋值 (100个)', () => {
        for (let i = 0; i < 100; i++) {
          kupolaData.data.proxy[`item${i}`] = `值 ${i + 1} - ${Date.now()}`;
        }
      });
      document.getElementById('proxy-progress').style.width = '100%';
      setTimeout(() => {
        document.getElementById('proxy-progress').style.width = '0%';
      }, 500);
    });

    document.getElementById('btn-proxy-deep').addEventListener('click', () => {
      measureTime('深层嵌套赋值', () => {
        kupolaData.data.user.address = {
          city: 'Beijing',
          street: 'Main Street',
          zip: '100000'
        };
      });
    });

    document.getElementById('btn-set-single').addEventListener('click', () => {
      measureTime('单个 set()', () => {
        kupolaData.set('set.item0', `更新于 ${new Date().toLocaleTimeString()}`);
      });
    });

    document.getElementById('btn-set-batch').addEventListener('click', () => {
      measureTime('批量 set() (100个)', () => {
        for (let i = 0; i < 100; i++) {
          kupolaData.set(`set.item${i}`, `值 ${i + 1} - ${Date.now()}`);
        }
      });
      document.getElementById('set-progress').style.width = '100%';
      setTimeout(() => {
        document.getElementById('set-progress').style.width = '0%';
      }, 500);
    });

    document.getElementById('btn-set-silent').addEventListener('click', () => {
      measureTime('批量 set() 静默模式', () => {
        for (let i = 0; i < 100; i++) {
          kupolaData.set(`set.item${i}`, `静默值 ${i + 1}`, true);
        }
        kupolaData.set('set.item0', `最终值 - ${Date.now()}`);
      });
    });

    document.getElementById('btn-generate-100').addEventListener('click', () => {
      measureTime('生成 100 条数据', () => {
        createTestGrid(document.getElementById('grid-large'), 100, 'large');
        const data = {};
        for (let i = 0; i < 100; i++) {
          data[`item${i}`] = `数据 ${i + 1}`;
        }
        kupolaData.set('large', data);
      });
      log('生成 100 条数据绑定', 'info');
    });

    document.getElementById('btn-generate-500').addEventListener('click', () => {
      measureTime('生成 500 条数据', () => {
        createTestGrid(document.getElementById('grid-large'), 500, 'large');
        const data = {};
        for (let i = 0; i < 500; i++) {
          data[`item${i}`] = `数据 ${i + 1}`;
        }
        kupolaData.set('large', data);
      });
      log('生成 500 条数据绑定', 'info');
    });

    document.getElementById('btn-generate-1000').addEventListener('click', () => {
      measureTime('生成 1000 条数据', () => {
        createTestGrid(document.getElementById('grid-large'), 1000, 'large');
        const data = {};
        for (let i = 0; i < 1000; i++) {
          data[`item${i}`] = `数据 ${i + 1}`;
        }
        kupolaData.set('large', data);
      });
      log('生成 1000 条数据绑定', 'info');
    });

    document.getElementById('btn-update-all').addEventListener('click', () => {
      const bindCount = document.querySelectorAll('[data-bind]').length;
      measureTime(`更新 ${bindCount} 个绑定元素`, () => {
        const keys = Object.keys(kupolaData.data.large || {});
        keys.forEach((key, index) => {
          kupolaData.data.large[key] = `更新值 ${index + 1} - ${Date.now()}`;
        });
      });
    });

    document.getElementById('btn-clear').addEventListener('click', () => {
      measureTime('清空数据', () => {
        document.getElementById('grid-large').innerHTML = '';
        kupolaData.set('large', {});
      });
      updateStats();
      log('数据已清空', 'info');
    });

    document.getElementById('btn-update-first').addEventListener('click', () => {
      kupolaData.data.user.firstName = `First${Date.now()}`;
    });

    document.getElementById('btn-update-last').addEventListener('click', () => {
      kupolaData.data.user.lastName = `Last${Date.now()}`;
    });

    document.getElementById('btn-update-both').addEventListener('click', () => {
      measureTime('同时修改两个依赖', () => {
        kupolaData.data.user.firstName = `First${Date.now()}`;
        kupolaData.data.user.lastName = `Last${Date.now()}`;
      });
    });

    setTimeout(() => {
      updateStats();
      log('页面加载完成，可开始测试', 'success');
    }, 100);
  </script>
</body>
</html>
